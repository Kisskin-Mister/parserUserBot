name: Bug report
description: Report a reproducible bug
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real Telegram credentials, phone numbers, session files, DB URLs, resumes, or private message text.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure ...
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
      description: Redact sensitive values before pasting logs.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 24.04, macOS 14, ..."
